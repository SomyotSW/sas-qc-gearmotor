<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>SYNERGY ASIA SOLUTION</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url("/static/BG.png") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
    }

    /* พื้นขาวโปร่ง */
    .overlay::before {
      content: "";
      position: fixed;
      inset: 0;
      background-color: rgba(255, 255, 255, 0.85);
      z-index: 0;
    }

    .sas-logo {
      position: fixed;
      top: 15px;
      left: 15px;
      height: 50px;
      z-index: 10;
    }

    /* wrapper กลาง */
    .overlay {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    /* แถวรูปซ้าย + กล่อง + รูปขวา */
    .layout-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
      z-index: 3;
    }

    /* รูปข้างกล่อง */
    .side-img {
      height: min(75vh, 520px);
      width: auto;
      object-fit: contain;
      pointer-events: none;
      flex-shrink: 0;
    }

    /* กล่อง menu */
    .welcome-container {
      background: #e9f4ff;
      padding: 40px 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      width: 420px;
      flex-shrink: 0;
      position: relative;
      z-index: 4;
    }

    h1 {
      color: #007bff;
      margin-bottom: 15px;
    }

    .btn-sas {
      width: 100%;
      display: block;
      margin-top: 15px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.55);
      background: linear-gradient(180deg, #5aa7ff 0%, #2f79d8 100%);
      color: #ffffff !important;
      font-weight: 700;
      letter-spacing: 0.2px;
      box-shadow:
        0 10px 18px rgba(0, 70, 160, 0.30),
        inset 0 1px 0 rgba(255,255,255,0.40),
        inset 0 -2px 0 rgba(0,0,0,0.12);
      transform: translateY(0);
      transition: transform 0.08s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }
    .btn-sas:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
      text-decoration: none;
    }
    .btn-sas:active {
      transform: translateY(2px) scale(0.99);
    }

    /* มือถือ — ซ่อนรูปข้าง */
    @media (max-width: 768px) {
      .side-img { display: none; }
      .welcome-container { width: 100%; max-width: 420px; }
    }
  </style>
</head>
<body>
  <img src="/static/logo_sas.png" alt="SAS Logo" class="sas-logo">

  <div class="overlay">
    <div class="layout-row">

      <!-- รูปซ้าย -->
      <img src="/static/3.png" alt="" class="side-img">

      <!-- กล่อง menu -->
      <div class="welcome-container">
        <h1>SYNERGY SYSTEM</h1>
        <h1>Update 5.4.26</h1>
        <a href="https://www.synergy-as.com" target="_blank" class="btn btn-lg btn-sas">🌐 www.synergy-as.com</a>
        <a href="https://www.motorsas.com" target="_blank" class="btn btn-lg btn-sas">⚙️ www.motorsas.com</a>
        <a href="/login" class="btn btn-lg btn-sas">🔐 SAS QC Report</a>
        <a href="/stock" class="btn btn-lg btn-sas">📦 STOCK ON SHELF</a>
        <a href="/check-status" class="btn btn-lg btn-sas">✈️ เช็คสถานะสินค้า</a>
      </div>

      <!-- รูปขวา -->
      <img src="/static/2.png" alt="" class="side-img">

    </div>
  </div>
</body>
</html>
