<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>SYNERGY ASIA SOLUTION</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:url("/static/BG.png") no-repeat center center fixed; background-size:cover; font-family:'Segoe UI',sans-serif; }
    .overlay::before { content:""; position:fixed; inset:0; background-color:rgba(255,255,255,0.85); z-index:0; }
    .sas-logo { position:fixed; top:15px; left:15px; height:50px; z-index:10; }
    .overlay { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; position:relative; z-index:2; }
    .layout-row { display:flex; align-items:center; justify-content:center; gap:0; position:relative; z-index:3; }
    .side-img { height:min(75vh,520px); width:auto; object-fit:contain; pointer-events:none; flex-shrink:0; }
    .welcome-container { background:#e9f4ff; padding:40px 30px; border-radius:12px; text-align:center; box-shadow:0 0 15px rgba(0,0,0,0.2); width:420px; flex-shrink:0; position:relative; z-index:4; }
    .btn-sas { width:100%; display:block; margin-top:15px; padding:14px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.55); background:linear-gradient(180deg,#5aa7ff 0%,#2f79d8 100%); color:#fff!important; font-weight:700; letter-spacing:0.2px; box-shadow:0 10px 18px rgba(0,70,160,0.30),inset 0 1px 0 rgba(255,255,255,0.40),inset 0 -2px 0 rgba(0,0,0,0.12); transform:translateY(0); transition:transform 0.08s ease,box-shadow 0.12s ease,filter 0.12s ease; }
    .btn-sas:hover { filter:brightness(1.03); transform:translateY(-1px); text-decoration:none; }
    .btn-sas:active { transform:translateY(2px) scale(0.99); }
    .btn-sas-start { width:100%; display:block; margin-top:22px; padding:18px 16px; border-radius:14px; border:1px solid rgba(255,255,255,0.55); background:linear-gradient(180deg,#34d270 0%,#169c4a 100%); color:#fff!important; font-weight:800; font-size:1.15rem; letter-spacing:0.6px; text-transform:uppercase; box-shadow:0 12px 22px rgba(15,125,60,0.35),inset 0 1px 0 rgba(255,255,255,0.45),inset 0 -2px 0 rgba(0,0,0,0.15); transform:translateY(0); transition:transform 0.08s ease,box-shadow 0.12s ease,filter 0.12s ease; position:relative; overflow:hidden; }
    .btn-sas-start::before { content:""; position:absolute; inset:0; background:radial-gradient(400px circle at var(--x,50%) var(--y,50%),rgba(255,255,255,0.22),transparent 40%); opacity:0; transition:opacity 0.2s ease; }
    .btn-sas-start:hover { filter:brightness(1.05); transform:translateY(-1px); text-decoration:none; }
    .btn-sas-start:hover::before { opacity:1; }
    .btn-sas-start:active { transform:translateY(2px) scale(0.99); }
    .btn-sas-start::after { content:""; position:absolute; inset:-4px; border-radius:18px; border:2px solid rgba(22,156,74,0.45); animation:pulseGreen 2.4s ease-out infinite; pointer-events:none; }
    @keyframes pulseGreen { 0%{transform:scale(1);opacity:0.8;} 70%{transform:scale(1.06);opacity:0;} 100%{transform:scale(1.06);opacity:0;} }
    /* ── Sales Dashboard Button ── */
    .btn-sas-sales {
      width:100%; display:block; margin-top:15px; padding:14px 16px;
      border-radius:12px; border:1px solid rgba(255,255,255,0.45);
      background:linear-gradient(180deg,#38bdf8 0%,#0369a1 100%);
      color:#fff!important; font-weight:700; letter-spacing:0.2px; cursor:pointer;
      box-shadow:0 10px 18px rgba(3,105,161,0.35),inset 0 1px 0 rgba(255,255,255,0.40),inset 0 -2px 0 rgba(0,0,0,0.12);
      transform:translateY(0); transition:transform 0.08s ease,box-shadow 0.12s ease,filter 0.12s ease;
      text-decoration:none;
    }
    .btn-sas-sales:hover { filter:brightness(1.07); transform:translateY(-1px); text-decoration:none; }
    .btn-sas-sales:active { transform:translateY(2px) scale(0.99); }
    .btn-sas-video {
      width:100%; display:block; margin-top:15px; padding:14px 16px; border-radius:12px;
      border:1px solid rgba(255,255,255,0.28); background:linear-gradient(180deg,#ff4d6d 0%,#b81d3d 100%);
      color:#fff!important; font-weight:800; letter-spacing:0.3px;
      box-shadow:0 12px 22px rgba(170,20,60,0.33), inset 0 1px 0 rgba(255,255,255,0.38), inset 0 -2px 0 rgba(0,0,0,0.16);
      transform:translateY(0); transition:transform 0.18s ease, box-shadow 0.22s ease, filter 0.22s ease;
      position:relative; overflow:hidden;
    }
    .btn-sas-video::before { content:""; position:absolute; inset:0; background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,0.26) 48%,transparent 100%); transform:translateX(-130%); transition:transform 0.7s ease; }
    .btn-sas-video:hover { filter:brightness(1.06); transform:translateY(-2px); text-decoration:none; box-shadow:0 18px 28px rgba(170,20,60,0.42), inset 0 1px 0 rgba(255,255,255,0.38), inset 0 -2px 0 rgba(0,0,0,0.16); }
    .btn-sas-video:hover::before { transform:translateX(130%); }
    .btn-sas-video:active { transform:translateY(1px) scale(0.99); }

    /* ── 4 Series Training Button: fixed at the circled left area ── */
    .circle-area-4series {
      position:fixed;
      left:58px;
      top:108px;
      width:220px;
      height:220px;
      z-index:20;
      text-align:center;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .btn-sas-4series {
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      padding:24px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,0.72);
      background:
        radial-gradient(circle at 35% 25%,rgba(255,255,255,0.32) 0%,transparent 30%),
        linear-gradient(145deg,#36c6ff 0%,#1764d4 56%,#0c4692 100%);
      color:#fff!important;
      font-weight:900;
      font-size:1.08rem;
      line-height:1.22;
      letter-spacing:0.25px;
      text-decoration:none;
      box-shadow:
        0 14px 28px rgba(24,100,212,0.38),
        inset 0 2px 0 rgba(255,255,255,0.46),
        inset 0 -6px 0 rgba(0,0,0,0.18);
      transform:translateY(0);
      transition:transform 0.12s ease, filter 0.16s ease, box-shadow 0.18s ease;
      position:relative;
      overflow:hidden;
    }
    .btn-sas-4series::before {
      content:"";
      position:absolute;
      inset:-40%;
      background:linear-gradient(120deg,transparent 35%,rgba(255,255,255,0.32) 50%,transparent 65%);
      transform:translateX(-90%) rotate(18deg);
      transition:transform 0.7s ease;
      pointer-events:none;
    }
    .btn-sas-4series::after {
      content:"";
      position:absolute;
      inset:10px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.20);
      pointer-events:none;
    }
    .btn-sas-4series:hover {
      filter:brightness(1.07);
      transform:translateY(-3px) scale(1.02);
      text-decoration:none;
      box-shadow:
        0 20px 36px rgba(24,100,212,0.48),
        inset 0 2px 0 rgba(255,255,255,0.46),
        inset 0 -6px 0 rgba(0,0,0,0.18);
    }
    .btn-sas-4series:hover::before { transform:translateX(90%) rotate(18deg); }
    .btn-sas-4series:active { transform:translateY(1px) scale(0.98); }
    .btn-sas-4series .icon { font-size:2rem; line-height:1; margin-bottom:2px; position:relative; z-index:1; }
    .btn-sas-4series .main { display:block; font-size:1.08rem; position:relative; z-index:1; }
    .btn-sas-4series small { display:block; font-size:0.82rem; margin-top:3px; font-weight:800; opacity:0.95; position:relative; z-index:1; }
    @media(max-width:1100px){ .circle-area-4series{left:38px;top:118px;width:200px;height:200px;} .btn-sas-4series .main{font-size:1rem;} .btn-sas-4series small{font-size:0.76rem;} }
    @media(max-width:768px){ .circle-area-4series{position:relative;left:auto;top:auto;width:190px;height:190px;margin:0 auto 18px;} }

    @media(max-width:768px){ .side-img{display:none;} .welcome-container{width:100%;max-width:420px;} }
  </style>
</head>
<body>
  <img src="/static/logo_sas.png" alt="SAS Logo" class="sas-logo">
  <div class="overlay">
    <div class="circle-area-4series">
      <a href="/sas_training_4series.html" class="btn-sas-4series"><span class="icon">⚙️</span><span class="main">4 Series<br>Training</span><small>R / K / F / S Series</small></a>
    </div>
    <div class="layout-row">
      <img src="/static/3.png" alt="" class="side-img">
      <div class="welcome-container">
        <a href="/login" class="btn btn-lg btn-sas">🔐 SAS QC Report</a>
        <a href="/stock" class="btn btn-lg btn-sas">📦 STOCK ON SHELF</a>
        <a href="/check-status" class="btn btn-lg btn-sas">✈️ เช็คสถานะสินค้า</a>
        <a href="/Video_Training.html" class="btn btn-lg btn-sas-video">🎬 VIDEO TRAINING</a>
        <a href="/sas_training_level1.html" class="btn btn-lg btn-sas">🎓 SAS TRAINING LEVEL 1</a>
        <a href="/sas_training_level2.html" class="btn btn-lg btn-sas">🏆 SAS TRAINING LEVEL 2</a>
        <a href="/sas_training_level3.html" class="btn btn-lg btn-sas">🏆 SAS TRAINING LEVEL 3</a>
        <a href="/matcher/" class="btn btn-lg btn-sas-start" id="btnStart">🚀 START &nbsp;·&nbsp; Gear Motor Matcher</a>
        <!-- 📊 Sales Dashboard — แทน Monthly Sales เดิม -->
        <a href="/sales-dashboard" class="btn btn-lg btn-sas-sales">📊 Sales Dashboard</a>
      </div>
      <img src="/static/2.png" alt="" class="side-img">
    </div>
  </div>
  <script>
    const btnStart=document.getElementById('btnStart');
    btnStart?.addEventListener('pointermove',e=>{ const r=btnStart.getBoundingClientRect(); btnStart.style.setProperty('--x',`${e.clientX-r.left}px`); btnStart.style.setProperty('--y',`${e.clientY-r.top}px`); });
  </script>
</body>
</html>
