
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>SYNERGY ASIA SOLUTION</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url("/static/BG.png") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
    }
    .overlay {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 2; /* content อยู่บนสุด */
    }

    /* แผ่นขาวทับพื้นหลัง (แต่ไม่บังรูป side) */
    .overlay::before {
      content: "";
      position: fixed;
      inset: 0;
      background-color: rgba(255, 255, 255, 0.85);
      z-index: 0;
    }
    .welcome-container {
      background: #e9f4ff; /* ฟ้าอ่อน */
      padding: 40px 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      max-width: 450px;
      width: 100%;
      position: relative;
      z-index: 3;
    }
    .sas-logo {
      position: absolute;
      top: 15px;
      left: 15px;
      height: 50px;
    }

    /* ===== Side background overlays ===== */
    .bg-side {
      position: fixed;
      top: 0;
      bottom: 0;
      width: min(30vw, 460px);
      height: 120vh;
      object-fit: contain;
      z-index: 1;
      pointer-events: none;
      opacity: 0.95;
    }
    .bg-left { left: 0; }
    .bg-right { right: 0; }
    .sas-logo { position: relative; z-index: 3; }
    h1 {
      color: #007bff;
      margin-bottom: 30px;
    }
    .btn-custom {
      margin-top: 15px;
    }

    /* ===== Full-width 3D Buttons (same tone) ===== */
    .btn-sas {
      width: 100%;
      display: block;
      margin-top: 15px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.55);
      background: linear-gradient(180deg, #5aa7ff 0%, #2f79d8 100%);
      color: #ffffff !important;
      font-weight: 700;
      letter-spacing: 0.2px;
      box-shadow:
        0 10px 18px rgba(0, 70, 160, 0.30),
        inset 0 1px 0 rgba(255,255,255,0.40),
        inset 0 -2px 0 rgba(0,0,0,0.12);
      transform: translateY(0);
      transition: transform 0.08s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }
    .btn-sas:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
      box-shadow:
        0 14px 24px rgba(0, 70, 160, 0.34),
        inset 0 1px 0 rgba(255,255,255,0.45),
        inset 0 -2px 0 rgba(0,0,0,0.10);
      text-decoration: none;
    }
    .btn-sas:active {
      transform: translateY(2px) scale(0.99);
      box-shadow:
        0 6px 12px rgba(0, 70, 160, 0.22),
        inset 0 2px 0 rgba(0,0,0,0.16),
        inset 0 -1px 0 rgba(255,255,255,0.20);
    }
  </style>
</head>
<body>
  <img src="/static/logo_sas.png" alt="SAS Logo" class="sas-logo">
  <img src="/static/3.png" alt="" class="bg-side bg-left">
  <img src="/static/2.png" alt="" class="bg-side bg-right">
  <div class="overlay">
    <div class="welcome-container">
      <h1>SYNERGY SYSTEM</h1>
      <h1>Update 26.2.26</h1>
      <a href="https://www.synergy-as.com" target="_blank" class="btn btn-lg btn-sas">🌐 www.synergy-as.com</a>
      <a href="https://www.motorsas.com" target="_blank" class="btn btn-lg btn-sas">⚙️ www.motorsas.com</a>
      <a href="/login" class="btn btn-lg btn-sas">🔐 SAS QC Report</a>
      <a href="/stock" class="btn btn-lg btn-sas">📦 STOCK ON SHELF</a>
      <a href="/check-status" class="btn btn-lg btn-sas">✈️ เช็คสถานะสินค้า</a>
    </div>
  </div>
</body>
</html>
