<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Stock on shelf</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background: linear-gradient(135deg, #0b2a5b 0%, #0e4aa6 55%, #ffffff 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    .glass{
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }
    .title{
      font-weight: 800;
      letter-spacing: .3px;
      color: #0b2a5b;
    }
    .sub{
      color: #2b4a7a;
    }
    .table thead th{
      background: #0b2a5b;
      color: white;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .badge-count{
      background: #0e4aa6;
    }
  
  /* ...ของเดิมทั้งหมด... */

  /* ===== NEW: 3D gradient animated title ===== */
    .title-3d{
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;

    /* gradient text */
      background: linear-gradient(90deg, #ffffff 0%, #b7dcff 45%, #ffffff 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;

    /* 3D emboss (white) */
      text-shadow:
        0 1px 0 rgba(255,255,255,0.7),
        0 2px 0 rgba(255,255,255,0.35),
        0 6px 14px rgba(0,0,0,0.35);

      animation: sheen 2.8s ease-in-out infinite alternate;
    }

    @keyframes sheen{
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

  /* ===== NEW: footer credit ===== */
    .presented-by{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 10px;
      text-align: center;
      font-size: 12px;
      opacity: 0.28;
      color: #000;
      pointer-events: none;
      user-select: none;
      letter-spacing: .3px;
    }

  /* ===== NEW: mobile responsive tweaks ===== */
    @media (max-width: 576px){
      body{ background: linear-gradient(160deg, #0b2a5b 0%, #0e4aa6 60%, #ffffff 140%); }

      .container{ padding-left: 12px; padding-right: 12px; }
      .glass{ border-radius: 14px; }

    /* header stack */
      .header-wrap{
        flex-direction: column;
        align-items: flex-start !important;
        gap: 10px;
      }
      .header-actions{
        width: 100%;
        justify-content: flex-end;
      }

      /* title scale */
      .title-3d{ font-size: 1.35rem !important; }

      /* input / button sizing */
      .form-control-lg{ font-size: 1rem; padding: .7rem .85rem; }
      .btn{ padding: .65rem .9rem; }

      /* table height on phones */
      .table-responsive{ max-height: 55vh !important; }
    }
  .truck-fly{
  position: fixed;
  top: 16px;                 /* ปรับสูง/ต่ำได้ */
  left: -90px;
  font-size: 40px;           /* รถคันใหญ่กว่าเครื่องบินนิดนึง */
  z-index: 1;                /* อยู่หลัง UI */
  opacity: 0.18;
  pointer-events: none;
  user-select: none;
  animation: truckRoundTrip 22s ease-in-out infinite; /* ช้าๆ */
  }

  @keyframes truckRoundTrip{
    0%   { transform: translateX(0) scaleX(-1); }
    49%  { transform: translateX(calc(100vw + 180px)) scaleX(-1); }
    50%  { transform: translateX(calc(100vw + 180px)) scaleX(1); }
    100% { transform: translateX(0) scaleX(1); }
  }
  
    /* ===== Code Image Popup (Supplier/Stock) ===== */
    .img-overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }
    .img-modal{
      width: min(920px, 95vw);
      max-height: 90vh;
      overflow: auto;
      background: rgba(255,255,255,0.98);
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.25);
      padding: 14px 14px 16px;
    }
    .code-img{
      width: 100%;
      height: auto;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
    }
    tr.code-row{ cursor: pointer; }
    tr.code-row:hover{ background: rgba(13,110,253,0.06); }

  </style>
</head>

<body>
  <span class="truck-fly">🚚</span>
  <div class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-3 header-wrap">
      <div>
        <div class="title-3d fs-2">📦 STOCK ON SHELF</div>
        <div class="sub">ค้นหา Code หรือเลื่อนดูรายการทั้งหมดได้</div>
      </div>
      <div class="d-flex gap-2 header-actions">
        <a href="#" class="btn btn-outline-light" onclick="return goUploadStock();">📤</a>
        <a href="/" class="btn btn-outline-light">Home</a>
      </div>
    </div>

    <div class="glass p-3 p-md-4">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-md-8">
          <label class="form-label fw-semibold">ค้นหา Code</label>
          <input id="search" type="text" class="form-control form-control-lg" placeholder="พิมพ์ Code เช่น A120 แล้วกด Enter หรือพิมพ์ได้เลย...">
        </div>
        <div class="col-12 col-md-4">
          <div class="d-flex justify-content-between align-items-center">
            <div class="fw-semibold">จำนวนรายการ</div>
            <span id="count" class="badge badge-count text-white fs-6">-</span>
          </div>
          <button id="reload" class="btn btn-primary w-100 mt-2">🔄 โหลดข้อมูลใหม่</button>
        </div>
      </div>

      <hr class="my-4">

      <div class="table-responsive" style="max-height: 65vh;">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th style="width: 22%;">Code</th>
              <th>Description</th>
              <th style="width: 18%;">Total</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="3">กำลังโหลดข้อมูล...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>


<!-- ===== Code Image Popup ===== -->
<div id="imgOverlay" class="img-overlay" onclick="hideCodeImage()">
  <div class="img-modal" onclick="event.stopPropagation()">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="fw-semibold" id="imgTitle">-</div>
      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="hideCodeImage()">ปิด</button>
    </div>
    <img id="codeImg" class="code-img" src="" alt="">
    <div id="imgError" class="text-danger small mt-2" style="display:none;">ไม่พบรูปภาพสำหรับ Code นี้</div>
  </div>
</div>


<script>
  let ALL = [];

  function render(list){
    const tbody = document.getElementById('tbody');
    const count = document.getElementById('count');
    count.textContent = list.length;

    if(!list.length){
      tbody.innerHTML = '<tr><td colspan="3">ไม่พบข้อมูล</td></tr>';
      return;
    }

    tbody.innerHTML = list.map(r => `
      <tr class="code-row" data-code="${escapeAttr(r.code || '')}">
        <td class="fw-semibold">${escapeHtml(r.code || '')}</td>
        <td>${escapeHtml(r.description || '')}</td>
        <td>${escapeHtml(r.total || '')}</td>
      </tr>
    `).join('');

    bindRowClicks();
  }

  function filterNow(){
    const q = (document.getElementById('search').value || '').trim().toLowerCase();
    if(!q){
      render(ALL);
      return;
    }
    const filtered = ALL.filter(r => (r.code || '').toLowerCase().includes(q));
    render(filtered);
  }

  async function load(){
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '<tr><td colspan="3">กำลังโหลดข้อมูล...</td></tr>';

    const res = await fetch('/api/stock', { cache: 'no-store' });
    const data = await res.json();

    if(!data.ok){
      tbody.innerHTML = `<tr><td colspan="3">โหลดข้อมูลไม่สำเร็จ: ${escapeHtml(data.error || 'Unknown error')}</td></tr>`;
      return;
    }

    ALL = data.rows || [];
    render(ALL);
  }


  function escapeAttr(str){
    return String(str).replace(/[&<>"']/g, s => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[s]));
  }

  function bindRowClicks(){
    const tbody = document.getElementById('tbody');
    tbody.querySelectorAll('tr.code-row').forEach(tr => {
      tr.addEventListener('click', () => showCodeImage(tr.dataset.code || ''));
    });
  }

  function showCodeImage(code){
    if(!code) return;
    const overlay = document.getElementById('imgOverlay');
    const img = document.getElementById('codeImg');
    const title = document.getElementById('imgTitle');
    const err = document.getElementById('imgError');

    title.textContent = code;
    err.style.display = 'none';

    const url = '/static/stock_images/' + encodeURIComponent(code) + '.png';

    img.onload = () => { err.style.display = 'none'; };
    img.onerror = () => { err.style.display = 'block'; };
    img.src = url;

    overlay.style.display = 'flex';
  }

  function hideCodeImage(){
    const overlay = document.getElementById('imgOverlay');
    const img = document.getElementById('codeImg');
    const err = document.getElementById('imgError');
    overlay.style.display = 'none';
    err.style.display = 'none';
    img.src = '';
  }

  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') hideCodeImage();
  });


  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[s]));
  }

  document.getElementById('search').addEventListener('input', filterNow);
  document.getElementById('search').addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); filterNow(); }
  });
  document.getElementById('reload').addEventListener('click', load);

  load();
  function goUploadStock(){
    const pass = prompt('กรอกรหัสเพื่อเข้า Upload Stock File');
    if(pass === null) return false; // กด Cancel
    if(pass.trim() === 'Adminsas2026'){
      window.location.href = '/stock-upload?key=' + encodeURIComponent(pass.trim());
    }else{
      alert('รหัสไม่ถูกต้อง');
    }
    return false;
  }
</script>
<div class="presented-by">Presented by Stephen A.</div>
</body>
</html>
